# =====================================================================
# SCALE50 chromosome-only baseline (matched to config_scale50.yaml)
# Same pipeline settings as the validated SCALE20 run. Block-style YAML.
# Run:  py -m src.pipeline --config config\config_scale50_chronly.yaml
# =====================================================================

project_name: probiotic_amr_cargo_scale50_chronly
output_dir: results_scale50_chronly

fetch:
  enabled: true
  full_assembly: false
  email: your.name@murdoch.edu.au
  api_key: null
  genome_dir: data/genomes

catalogues:
  amr_fasta: data/catalogues/card_nucleotide.fasta
  replicon_fasta: data/catalogues/replicons.fasta
  is_fasta: data/catalogues/insertion_sequences.fasta
  conjugation_fasta: data/catalogues/conjugation.fasta

screen:
  backend: builtin
  abricate_db: card
  min_identity: 95
  min_coverage: 80
  collapse_overlaps: true
  overlap_threshold: 0.8

mge:
  flank_bp: 5000
  min_identity: 80
  min_coverage: 60

compare:
  identity_threshold: 95

